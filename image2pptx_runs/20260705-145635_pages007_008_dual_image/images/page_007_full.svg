<text x="640" y="648" font-family="Arial Unicode MS" font-size="18" font-weight="700" fill="#23312D" text-anchor="middle">核心逻辑：以授权取证和证据入库为基础，用模型评价形成结果，再通过场景调用和反馈更新形成可持续运营闭环。</text></svg>