<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#FFFFFF"/>
<g data-zone-id="zone_page_number" data-primitive="page_number_badge"><image href="../images/crop_page_number_badge.png" x="38" y="14" width="40" height="40" preserveAspectRatio="none"/></g>
<g data-zone-id="zone_title" data-primitive="title_block">
<text data-text-region-id="title" x="88" y="46" font-family="Microsoft YaHei" font-size="22" font-weight="700" fill="#023285">电力领域数据基础设施为可靠性成果深化应用提供受控承接底座</text>
<rect x="0" y="90" width="1280" height="3" fill="#C00000" data-primitive="title_rule" data-geometry-lock-id="lock_title_rule"/>
</g>
<g data-zone-id="zone_guidance" data-primitive="guidance_banner" data-geometry-lock-id="lock_guidance_band">
<rect x="38" y="104" width="1204" height="88" rx="4" fill="#E8F4FC" stroke="#B8D4E8" stroke-width="1.2"/>
<line x1="38" y1="192" x2="1242" y2="192" stroke="#B8D4E8" stroke-width="2"/>
<g data-icon-id="icon-guidance"><image href="../images/crop_icon_guidance.png" x="57.05" y="139.03" width="18.00" height="18.00" preserveAspectRatio="xMidYMid meet"/></g>
<text data-text-region-id="guidance" x="94" y="126" font-family='Microsoft YaHei' font-size="12" font-weight="400" fill="#1A3A6B" text-anchor="start" data-paragraph-line-height="16" data-fit-width="1116" data-fit-height="56"><tspan x="94" dy="0">电力领域数据基础设施在可靠性场景中的价值，体现在把可靠性资源、规则、授权、计算、结果和反馈统一组织起来，形成边界清晰、过程留痕、结果可用的运行机制。</tspan></text>
</g>
<g data-zone-id="zone_stage_01" data-primitive="chevron_column_header"><polygon points="38.0,207.0 251.2,207.0 269.2,236.0 251.2,265.0 38.0,265.0 56.0,236.0" fill="#023285"/><g data-icon-id="icon-h-zone_stage_01"><image href="../images/crop_icon_h_zone_stage_01.png" x="59.06" y="229.03" width="13.97" height="13.97" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_1_header" x="161.6" y="243.0" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="700" fill="#FFFFFF">资源目录化</text></g>
<g data-zone-id="zone_stage_01" data-primitive="stage_detail_card"><rect x="38.0" y="277.0" width="231.2" height="252.0" rx="6" fill="#FFFFFF" stroke="#C8D8E8" stroke-width="1.2" data-geometry-lock-id="lock_column_01"/><g data-icon-id="icon-c-zone_stage_01-content"><image href="../images/crop_icon_c_zone_stage_01_content.png" x="49.42" y="292.50" width="13.03" height="13.03" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_01-audience"><image href="../images/crop_icon_c_zone_stage_01_audience.png" x="49.92" y="388.98" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_01-value"><image href="../images/crop_icon_c_zone_stage_01_value.png" x="49.92" y="466.96" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_1_body" x="52.0" y="317" font-family='Microsoft YaHei' font-size="11.0" font-weight="400" fill="#1A3A6B" text-anchor="start" data-paragraph-line-height="12.32" data-fit-width="203.2" data-fit-height="204"><tspan x="52.0" dy="0">建立可靠性数据目录、指标目录、规则目</tspan><tspan x="52.0" dy="12.32">录、成果目录和产品目录，明确资源来源</tspan><tspan x="52.0" dy="12.32">、责任主体、质量状态、授权状态和适用</tspan><tspan x="52.0" dy="12.32">场景。</tspan></text></g>
<g data-chain-connector="stage_01->stage_02" data-primitive="horizontal_arrow_connector"><line x1="271.2" y1="403.0" x2="275.2" y2="403.0" stroke="#2E7FD6" stroke-width="2"/><polygon points="279.2,403.0 275.2,399.0 275.2,407.0" fill="#2E7FD6"/></g>
<g data-zone-id="zone_stage_02" data-primitive="chevron_column_header"><polygon points="281.2,207.0 494.4,207.0 512.4,236.0 494.4,265.0 281.2,265.0 299.2,236.0" fill="#023285"/><g data-icon-id="icon-h-zone_stage_02"><image href="../images/crop_icon_h_zone_stage_02.png" x="302.26" y="229.03" width="13.97" height="13.97" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_2_header" x="404.8" y="243.0" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="700" fill="#FFFFFF">规则工程化</text></g>
<g data-zone-id="zone_stage_02" data-primitive="stage_detail_card"><rect x="281.2" y="277.0" width="231.2" height="252.0" rx="6" fill="#FFFFFF" stroke="#C8D8E8" stroke-width="1.2" data-geometry-lock-id="lock_column_02"/><g data-icon-id="icon-c-zone_stage_02-content"><image href="../images/crop_icon_c_zone_stage_02_content.png" x="292.62" y="292.50" width="13.03" height="13.03" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_02-audience"><image href="../images/crop_icon_c_zone_stage_02_audience.png" x="293.12" y="388.98" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_02-value"><image href="../images/crop_icon_c_zone_stage_02_value.png" x="293.12" y="466.96" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_2_body" x="295.2" y="317" font-family='Microsoft YaHei' font-size="11.0" font-weight="400" fill="#1A3A6B" text-anchor="start" data-paragraph-line-height="12.32" data-fit-width="203.2" data-fit-height="204"><tspan x="295.2" dy="0">把指标口径、评价规程、采集规范、质量</tspan><tspan x="295.2" dy="12.32">校核逻辑转化为字段、规则、模板和计算</tspan><tspan x="295.2" dy="12.32">流程。</tspan></text></g>
<g data-chain-connector="stage_02->stage_03" data-primitive="horizontal_arrow_connector"><line x1="514.4" y1="403.0" x2="518.4" y2="403.0" stroke="#2E7FD6" stroke-width="2"/><polygon points="522.4,403.0 518.4,399.0 518.4,407.0" fill="#2E7FD6"/></g>
<g data-zone-id="zone_stage_03" data-primitive="chevron_column_header"><polygon points="524.4,207.0 737.6,207.0 755.6,236.0 737.6,265.0 524.4,265.0 542.4,236.0" fill="#023285"/><g data-icon-id="icon-h-zone_stage_03"><image href="../images/crop_icon_h_zone_stage_03.png" x="545.46" y="229.03" width="13.97" height="13.97" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_3_header" x="648.0" y="243.0" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="700" fill="#FFFFFF">受控计算</text></g>
<g data-zone-id="zone_stage_03" data-primitive="stage_detail_card"><rect x="524.4" y="277.0" width="231.2" height="252.0" rx="6" fill="#FFFFFF" stroke="#C8D8E8" stroke-width="1.2" data-geometry-lock-id="lock_column_03"/><g data-icon-id="icon-c-zone_stage_03-content"><image href="../images/crop_icon_c_zone_stage_03_content.png" x="535.82" y="292.50" width="13.03" height="13.03" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_03-audience"><image href="../images/crop_icon_c_zone_stage_03_audience.png" x="536.32" y="388.98" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_03-value"><image href="../images/crop_icon_c_zone_stage_03_value.png" x="536.32" y="466.96" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_3_body" x="538.4" y="317" font-family='Microsoft YaHei' font-size="11.0" font-weight="400" fill="#1A3A6B" text-anchor="start" data-paragraph-line-height="12.32" data-fit-width="203.2" data-fit-height="204"><tspan x="538.4" dy="0">支持汇总统计、规则计算、质量校核、本</tspan><tspan x="538.4" dy="12.32">地计算、可信执行和结果生成，敏感明细</tspan><tspan x="538.4" dy="12.32">保持在原有管理边界内。</tspan></text></g>
<g data-chain-connector="stage_03->stage_04" data-primitive="horizontal_arrow_connector"><line x1="757.6" y1="403.0" x2="761.6" y2="403.0" stroke="#2E7FD6" stroke-width="2"/><polygon points="765.6,403.0 761.6,399.0 761.6,407.0" fill="#2E7FD6"/></g>
<g data-zone-id="zone_stage_04" data-primitive="chevron_column_header"><polygon points="767.6,207.0 980.8,207.0 998.8,236.0 980.8,265.0 767.6,265.0 785.6,236.0" fill="#023285"/><g data-icon-id="icon-h-zone_stage_04"><image href="../images/crop_icon_h_zone_stage_04.png" x="788.66" y="229.03" width="13.97" height="13.97" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_4_header" x="891.2" y="243.0" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="700" fill="#FFFFFF">结果出证</text></g>
<g data-zone-id="zone_stage_04" data-primitive="stage_detail_card"><rect x="767.6" y="277.0" width="231.2" height="252.0" rx="6" fill="#FFFFFF" stroke="#C8D8E8" stroke-width="1.2" data-geometry-lock-id="lock_column_04"/><g data-icon-id="icon-c-zone_stage_04-content"><image href="../images/crop_icon_c_zone_stage_04_content.png" x="779.02" y="292.50" width="13.03" height="13.03" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_04-audience"><image href="../images/crop_icon_c_zone_stage_04_audience.png" x="779.52" y="388.98" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_04-value"><image href="../images/crop_icon_c_zone_stage_04_value.png" x="779.52" y="466.96" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_4_body" x="781.5999999999999" y="317" font-family='Microsoft YaHei' font-size="11.0" font-weight="400" fill="#1A3A6B" text-anchor="start" data-paragraph-line-height="12.32" data-fit-width="203.2" data-fit-height="204"><tspan x="781.5999999999999" dy="0">输出分析报告、专题评价、诊断结论、风</tspan><tspan x="781.5999999999999" dy="12.32">险标签和核验结果，通过版本留痕和出证</tspan><tspan x="781.5999999999999" dy="12.32">审计保障可复核。</tspan></text></g>
<g data-chain-connector="stage_04->stage_05" data-primitive="horizontal_arrow_connector"><line x1="1000.8" y1="403.0" x2="1004.8" y2="403.0" stroke="#2E7FD6" stroke-width="2"/><polygon points="1008.8,403.0 1004.8,399.0 1004.8,407.0" fill="#2E7FD6"/></g>
<g data-zone-id="zone_stage_05" data-primitive="chevron_column_header"><polygon points="1010.8,207.0 1224.0,207.0 1242.0,236.0 1224.0,265.0 1010.8,265.0 1028.8,236.0" fill="#023285"/><g data-icon-id="icon-h-zone_stage_05"><image href="../images/crop_icon_h_zone_stage_05.png" x="1031.86" y="229.03" width="13.97" height="13.97" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_5_header" x="1134.4" y="243.0" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="700" fill="#FFFFFF">服务运营</text></g>
<g data-zone-id="zone_stage_05" data-primitive="stage_detail_card"><rect x="1010.8" y="277.0" width="231.2" height="252.0" rx="6" fill="#FFFFFF" stroke="#C8D8E8" stroke-width="1.2" data-geometry-lock-id="lock_column_05"/><g data-icon-id="icon-c-zone_stage_05-content"><image href="../images/crop_icon_c_zone_stage_05_content.png" x="1022.22" y="292.50" width="13.03" height="13.03" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_05-audience"><image href="../images/crop_icon_c_zone_stage_05_audience.png" x="1022.72" y="388.98" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><g data-icon-id="icon-c-zone_stage_05-value"><image href="../images/crop_icon_c_zone_stage_05_value.png" x="1022.72" y="466.96" width="12.02" height="12.02" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="stage_5_body" x="1024.8" y="317" font-family='Microsoft YaHei' font-size="11.0" font-weight="400" fill="#1A3A6B" text-anchor="start" data-paragraph-line-height="12.32" data-fit-width="203.2" data-fit-height="204"><tspan x="1024.8" dy="0">将服务反馈、整改结果、案例复盘回流到</tspan><tspan x="1024.8" dy="12.32">指标基准库、规则模型库、案例知识库和</tspan><tspan x="1024.8" dy="12.32">产品库。</tspan></text></g>
<g data-zone-id="zone_footer_art" data-primitive="footer_decorative_band"><rect x="0" y="641" width="1280" height="79" fill="#023285"/></g>
<image href="../images/crop_01_footer_power_art.png" x="760" y="641" width="480" height="79" data-crop-id="footer_power_art" data-crop-role="footer_line_art" preserveAspectRatio="xMaxYMid meet"/>
<g data-zone-id="zone_footer" data-primitive="footer_summary_band" data-geometry-lock-id="lock_footer_bar"><rect x="38" y="558" width="1204" height="68" rx="4" fill="#E8F4FC" stroke="#B8D4E8"/><g data-icon-id="icon-footer-target"><image href="../images/crop_icon_footer_target.png" x="57.05" y="582.98" width="18.00" height="18.00" preserveAspectRatio="xMidYMid meet"/></g><text data-text-region-id="footer" x="94" y="572" font-family='Microsoft YaHei' font-size="12" font-weight="400" fill="#1A3A6B" text-anchor="start" data-paragraph-line-height="16" data-fit-width="1004" data-fit-height="44"><tspan x="94" dy="0">数据基础设施解决的不是“拿数据”，而是把可靠性成果在安全边界内组织成可运行、可复用、可交付的场景机制。</tspan></text></g>
</svg>