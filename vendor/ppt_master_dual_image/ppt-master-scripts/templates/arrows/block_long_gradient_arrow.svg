<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  Block Long Gradient Arrow
  Use case: a single dominant direction, strategic path, or conclusion pointer.
  Export contract: closed path body; no marker-end dependency.
  -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="55%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <text x="72" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#0F172A">Strategic Direction Arrow</text>
  <text x="72" y="116" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#64748B">A wide editable arrow for growth direction, target-state migration, or final recommendation.</text>

  <g id="long-arrow" font-family="Microsoft YaHei, Arial, sans-serif">
    <path d="M100,270 H830 V210 L1180,360 L830,510 V450 H100 Z" fill="url(#bodyGrad)" stroke="#1D4ED8" stroke-width="3"/>
    <path d="M125,300 H790" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.45"/>
    <path d="M125,420 H790" stroke="#1E40AF" stroke-width="2" stroke-opacity="0.18"/>
    <text x="410" y="352" text-anchor="middle" font-size="30" font-weight="800" fill="#0F172A">从能力建设走向规模化价值释放</text>
    <text x="410" y="390" text-anchor="middle" font-size="17" font-weight="600" fill="#1E3A8A">capability foundation → operational adoption → measurable outcomes</text>
    <text x="940" y="366" text-anchor="middle" font-size="23" font-weight="800" fill="#FFFFFF">目标态</text>
  </g>

  <g id="subpoints" font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="120" y="555" width="260" height="54" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <text x="250" y="589" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">投入与治理</text>
    <rect x="510" y="555" width="260" height="54" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <text x="640" y="589" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">平台与数据</text>
    <rect x="900" y="555" width="260" height="54" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <text x="1030" y="589" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">业务与价值</text>
  </g>
</svg>

