<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  Connector Arrow Set
  Use case: thin relationship arrows between existing modules.
  Export contract: marker heads are triangle / diamond / oval only.
  -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="diamondBlue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="5,0 10,5 5,10 0,5" fill="#2563EB"/>
    </marker>
    <marker id="ovalSlate" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="4" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <text x="60" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#0F172A">Connector Arrow Set</text>
  <text x="60" y="102" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#64748B">Native line arrows for process links, dependencies, and data direction.</text>

  <g id="examples" font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="80" y="170" width="170" height="70" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="165" y="213" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A8A">Source</text>
    <rect x="390" y="170" width="170" height="70" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="475" y="213" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A8A">Target</text>
    <line x1="250" y1="205" x2="390" y2="205" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

    <rect x="700" y="145" width="170" height="60" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="785" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Request</text>
    <rect x="980" y="145" width="170" height="60" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1065" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Service</text>
    <line x1="870" y1="165" x2="980" y2="165" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <line x1="980" y1="190" x2="870" y2="190" stroke="#475569" stroke-width="3" marker-end="url(#arrowSlate)"/>

    <rect x="80" y="365" width="170" height="64" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="165" y="404" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Step A</text>
    <rect x="400" y="365" width="170" height="64" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="485" y="404" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Step B</text>
    <path d="M250,397 L325,397 L325,320 L485,320 L485,365" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowSlate)"/>

    <rect x="720" y="355" width="170" height="70" rx="10" fill="#F0FDFA" stroke="#99F6E4" stroke-width="2"/>
    <text x="805" y="397" text-anchor="middle" font-size="16" font-weight="700" fill="#115E59">Milestone</text>
    <line x1="890" y1="390" x2="1080" y2="390" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-start="url(#ovalSlate)" marker-end="url(#diamondBlue)"/>
    <text x="985" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">controlled handoff</text>
  </g>
</svg>

