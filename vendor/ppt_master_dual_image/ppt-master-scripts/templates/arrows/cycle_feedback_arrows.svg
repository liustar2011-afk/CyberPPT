<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  Cycle Feedback Arrows
  Use case: feedback loop, governance cycle, PDCA, iterative optimization.
  Export contract: arc strokes are simple paths; arrow heads are manual closed polygons.
  -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <text x="70" y="76" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#0F172A">Closed-Loop Feedback Cycle</text>
  <text x="70" y="108" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#64748B">Use for PDCA-style iteration, monitoring-feedback-improvement, or governance loops.</text>

  <g id="cycle" font-family="Microsoft YaHei, Arial, sans-serif">
    <circle cx="640" cy="360" r="106" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="640" y="350" text-anchor="middle" font-size="22" font-weight="800" fill="#0F172A">持续优化</text>
    <text x="640" y="380" text-anchor="middle" font-size="14" fill="#64748B">closed loop</text>

    <path d="M640,165 A195,195 0 0 1 835,360" fill="none" stroke="#2563EB" stroke-width="14" stroke-linecap="round"/>
    <polygon points="824,316 872,360 810,368" fill="#2563EB"/>
    <path d="M835,360 A195,195 0 0 1 640,555" fill="none" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>
    <polygon points="684,544 640,592 632,530" fill="#3B82F6"/>
    <path d="M640,555 A195,195 0 0 1 445,360" fill="none" stroke="#60A5FA" stroke-width="14" stroke-linecap="round"/>
    <polygon points="456,404 408,360 470,352" fill="#60A5FA"/>
    <path d="M445,360 A195,195 0 0 1 640,165" fill="none" stroke="#93C5FD" stroke-width="14" stroke-linecap="round"/>
    <polygon points="596,176 640,128 648,190" fill="#93C5FD"/>

    <rect x="540" y="118" width="200" height="58" rx="29" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="640" y="154" text-anchor="middle" font-size="17" font-weight="800" fill="#1E3A8A">计划</text>
    <rect x="815" y="331" width="200" height="58" rx="29" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="915" y="367" text-anchor="middle" font-size="17" font-weight="800" fill="#1E3A8A">执行</text>
    <rect x="540" y="545" width="200" height="58" rx="29" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="640" y="581" text-anchor="middle" font-size="17" font-weight="800" fill="#1E3A8A">评估</text>
    <rect x="265" y="331" width="200" height="58" rx="29" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="365" y="367" text-anchor="middle" font-size="17" font-weight="800" fill="#1E3A8A">改进</text>
  </g>
</svg>

