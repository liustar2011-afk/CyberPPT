<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  Data Flow Swimlanes
  Use case: cross-lane platform, system, or data handoff diagrams with labeled arrows.
  Export contract: every non-trivial arrow has a label; marker head is triangle.
  -->
  <defs>
    <marker id="flowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="returnHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <text x="64" y="68" font-family="Microsoft YaHei, Arial, sans-serif" font-size="31" font-weight="700" fill="#0F172A">Data Flow Swimlanes</text>
  <text x="64" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#64748B">Use for platform handoffs, request-response paths, and cross-domain data movement.</text>

  <g id="lanes" font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="64" y="145" width="1152" height="120" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="64" y="265" width="1152" height="120" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="64" y="385" width="1152" height="120" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="64" y="505" width="1152" height="95" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

    <text x="100" y="210" font-size="17" font-weight="800" fill="#334155">业务侧</text>
    <text x="100" y="330" font-size="17" font-weight="800" fill="#334155">平台侧</text>
    <text x="100" y="450" font-size="17" font-weight="800" fill="#334155">数据侧</text>
    <text x="100" y="560" font-size="17" font-weight="800" fill="#334155">治理侧</text>

    <rect x="245" y="175" width="155" height="58" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="322" y="211" text-anchor="middle" font-size="15" font-weight="800" fill="#1E3A8A">业务请求</text>
    <rect x="535" y="295" width="175" height="58" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="622" y="331" text-anchor="middle" font-size="15" font-weight="800" fill="#1E3A8A">服务编排</text>
    <rect x="835" y="415" width="175" height="58" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="922" y="451" text-anchor="middle" font-size="15" font-weight="800" fill="#1E3A8A">可信数据</text>
    <rect x="535" y="525" width="175" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="622" y="556" text-anchor="middle" font-size="15" font-weight="800" fill="#334155">审计规则</text>

    <path d="M400,204 C470,204 470,324 535,324" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#flowHead)"/>
    <rect x="428" y="246" width="106" height="24" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="481" y="263" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB">提交需求</text>

    <path d="M710,324 C780,324 780,444 835,444" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#flowHead)"/>
    <rect x="736" y="366" width="106" height="24" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="789" y="383" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB">调用数据</text>

    <path d="M835,458 C750,490 720,550 710,550" fill="none" stroke="#64748B" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round" marker-end="url(#returnHead)"/>
    <rect x="736" y="505" width="110" height="24" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="791" y="522" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">审计反馈</text>
  </g>
</svg>
