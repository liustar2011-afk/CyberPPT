<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  Block Chevron Sequence
  Use case: 3-6 phase chains with chunky, editable chevron arrows.
  Export contract: block arrows are closed polygons, not marker-end lines.
  -->
  <defs>
    <linearGradient id="chev1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="chev2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="chev3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="chev4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="chev5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <text x="70" y="76" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#0F172A">Five-Stage Chevron Chain</text>
  <text x="70" y="108" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#64748B">Use as a main-chain structure for phase progression, roadmap, or methodology pages.</text>

  <g id="chevron-chain" font-family="Microsoft YaHei, Arial, sans-serif">
    <polygon points="80,250 265,250 305,320 265,390 80,390" fill="url(#chev1)" stroke="#BFDBFE" stroke-width="2"/>
    <polygon points="287,250 480,250 520,320 480,390 287,390 327,320" fill="url(#chev2)" stroke="#93C5FD" stroke-width="2"/>
    <polygon points="502,250 700,250 740,320 700,390 502,390 542,320" fill="url(#chev3)" stroke="#60A5FA" stroke-width="2"/>
    <polygon points="722,250 920,250 960,320 920,390 722,390 762,320" fill="url(#chev4)" stroke="#3B82F6" stroke-width="2"/>
    <polygon points="942,250 1140,250 1185,320 1140,390 942,390 982,320" fill="url(#chev5)" stroke="#1D4ED8" stroke-width="2"/>

    <text x="170" y="306" text-anchor="middle" font-size="20" font-weight="800" fill="#1E3A8A">01</text>
    <text x="170" y="336" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">诊断</text>
    <text x="405" y="306" text-anchor="middle" font-size="20" font-weight="800" fill="#1E3A8A">02</text>
    <text x="405" y="336" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">设计</text>
    <text x="625" y="306" text-anchor="middle" font-size="20" font-weight="800" fill="#FFFFFF">03</text>
    <text x="625" y="336" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">试点</text>
    <text x="845" y="306" text-anchor="middle" font-size="20" font-weight="800" fill="#FFFFFF">04</text>
    <text x="845" y="336" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">推广</text>
    <text x="1065" y="306" text-anchor="middle" font-size="20" font-weight="800" fill="#FFFFFF">05</text>
    <text x="1065" y="336" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">优化</text>
  </g>

  <g id="annotation" font-family="Microsoft YaHei, Arial, sans-serif">
    <line x1="120" y1="445" x2="1140" y2="445" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="120" cy="445" r="6" fill="#2563EB"/>
    <circle cx="375" cy="445" r="6" fill="#2563EB"/>
    <circle cx="630" cy="445" r="6" fill="#2563EB"/>
    <circle cx="885" cy="445" r="6" fill="#2563EB"/>
    <circle cx="1140" cy="445" r="6" fill="#2563EB"/>
    <text x="630" y="480" text-anchor="middle" font-size="14" fill="#64748B">Optional timeline, deliverables, or governance checkpoints can sit below the chain.</text>
  </g>
</svg>

