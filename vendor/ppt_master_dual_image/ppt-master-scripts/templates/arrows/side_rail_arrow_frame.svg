<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Side rail arrows bracketing multiple architecture rows. -->
  <defs>
    <marker id="railHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#123A73"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <g fill="#F8FAFC" stroke="#D7E3F4" stroke-width="2">
    <rect x="165" y="120" width="950" height="100" rx="12"/>
    <rect x="165" y="295" width="950" height="100" rx="12"/>
    <rect x="165" y="470" width="950" height="100" rx="12"/>
  </g>
  <path d="M105,560 V170 H150" fill="none" stroke="#123A73" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#railHead)"/>
  <path d="M1175,170 V560 H1130" fill="none" stroke="#123A73" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#railHead)"/>
  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#123A73">
    <text x="205" y="178">端到端覆盖</text>
    <text x="205" y="353">过程贯通</text>
    <text x="205" y="528">底座保障</text>
  </g>
</svg>
