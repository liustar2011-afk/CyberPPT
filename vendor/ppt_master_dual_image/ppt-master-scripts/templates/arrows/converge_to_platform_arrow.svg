<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Multiple streams converge into one platform block. -->
  <defs>
    <marker id="head" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="830" y="270" width="270" height="130" rx="18" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="965" y="345" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#123A73">统一平台</text>
  <g fill="#FFFFFF" stroke="#D7E3F4" stroke-width="2" font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="130" y="130" width="220" height="70" rx="12"/>
    <rect x="130" y="285" width="220" height="70" rx="12"/>
    <rect x="130" y="440" width="220" height="70" rx="12"/>
  </g>
  <g stroke="#2563EB" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M350,165 C560,165 610,320 830,320" marker-end="url(#head)"/>
    <path d="M350,320 H830" marker-end="url(#head)"/>
    <path d="M350,475 C560,475 610,350 830,350" marker-end="url(#head)"/>
  </g>
  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">
    <text x="240" y="173">来源 A</text>
    <text x="240" y="328">来源 B</text>
    <text x="240" y="483">来源 C</text>
  </g>
</svg>
