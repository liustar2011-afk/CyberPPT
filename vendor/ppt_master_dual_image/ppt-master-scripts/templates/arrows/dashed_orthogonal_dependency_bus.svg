<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Dotted orthogonal dependencies with elbows across multiple cards. -->
  <defs>
    <marker id="depHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#123A73"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <g fill="#FFFFFF" stroke="#D7E3F4" stroke-width="2">
    <rect x="90" y="120" width="220" height="82" rx="12"/>
    <rect x="530" y="120" width="220" height="82" rx="12"/>
    <rect x="970" y="120" width="220" height="82" rx="12"/>
    <rect x="310" y="470" width="220" height="82" rx="12"/>
    <rect x="750" y="470" width="220" height="82" rx="12"/>
  </g>
  <g stroke="#123A73" stroke-width="3" stroke-dasharray="8 7" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M200,202 V300 H640 V202" marker-end="url(#depHead)"/>
    <path d="M640,202 V300 H1080 V202" marker-end="url(#depHead)"/>
    <path d="M420,470 V350 H640" marker-end="url(#depHead)"/>
    <path d="M860,470 V350 H640" marker-end="url(#depHead)"/>
  </g>
  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#123A73" text-anchor="middle">
    <text x="200" y="168">上游 A</text>
    <text x="640" y="168">核心 B</text>
    <text x="1080" y="168">上游 C</text>
    <text x="420" y="518">支撑 D</text>
    <text x="860" y="518">支撑 E</text>
  </g>
</svg>
