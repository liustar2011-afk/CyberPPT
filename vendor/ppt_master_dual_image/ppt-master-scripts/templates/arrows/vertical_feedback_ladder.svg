<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Vertical ascent and return arrows between two stacked layers. -->
  <defs>
    <marker id="blueHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="slateHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="250" y="140" width="780" height="130" rx="16" fill="#F8FAFC" stroke="#D7E3F4" stroke-width="2"/>
  <rect x="250" y="450" width="780" height="130" rx="16" fill="#F8FAFC" stroke="#D7E3F4" stroke-width="2"/>
  <path d="M520,450 V270" stroke="#2563EB" stroke-width="8" stroke-linecap="round" marker-end="url(#blueHead)"/>
  <path d="M760,270 V450" stroke="#64748B" stroke-width="5" stroke-dasharray="8 7" stroke-linecap="round" marker-end="url(#slateHead)"/>
  <text x="640" y="212" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#123A73">应用层</text>
  <text x="640" y="522" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#123A73">支撑层</text>
  <text x="480" y="360" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#2563EB">能力上行</text>
  <text x="800" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#64748B">反馈回流</text>
</svg>

