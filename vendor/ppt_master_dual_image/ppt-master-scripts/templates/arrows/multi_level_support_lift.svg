<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Full architecture support lift: bottom arrows + center bridge + upper taps. -->
  <defs>
    <marker id="tapHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#123A73"/>
    </marker>
    <linearGradient id="bridge" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9DB6DE" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="up" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E5EEF9"/>
      <stop offset="100%" stop-color="#082B5F"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="55" y="120" width="1170" height="130" rx="12" fill="#F8FAFC" stroke="#D7E3F4" stroke-width="2"/>
  <rect x="55" y="330" width="1170" height="130" rx="12" fill="#F8FAFC" stroke="#D7E3F4" stroke-width="2"/>
  <line x1="80" y1="285" x2="1200" y2="285" stroke="#123A73" stroke-width="3" stroke-dasharray="8 8"/>
  <g stroke="#123A73" stroke-width="3" stroke-dasharray="8 8">
    <line x1="180" y1="285" x2="180" y2="250" marker-end="url(#tapHead)"/>
    <line x1="410" y1="285" x2="410" y2="250" marker-end="url(#tapHead)"/>
    <line x1="640" y1="285" x2="640" y2="250" marker-end="url(#tapHead)"/>
    <line x1="870" y1="285" x2="870" y2="250" marker-end="url(#tapHead)"/>
    <line x1="1100" y1="285" x2="1100" y2="250" marker-end="url(#tapHead)"/>
  </g>
  <path d="M365,460 H535 V415 L640,355 L745,415 V460 H915 V520 H365 Z" fill="url(#bridge)" stroke="#B7C9E7" stroke-width="2"/>
  <line x1="40" y1="650" x2="1240" y2="650" stroke="#0B3B76" stroke-width="8"/>
  <g fill="url(#up)" stroke="#D8E6F7" stroke-width="2">
    <path d="M245,635 H285 V595 H315 L265,535 L215,595 H245 Z"/>
    <path d="M610,635 H650 V595 H680 L630,535 L580,595 H610 Z"/>
    <path d="M975,635 H1015 V595 H1045 L995,535 L945,595 H975 Z"/>
  </g>
</svg>
