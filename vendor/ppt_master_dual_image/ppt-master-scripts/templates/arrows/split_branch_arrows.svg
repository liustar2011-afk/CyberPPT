<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!--
  Split Branch Arrows
  Use case: one source branches into two or three downstream paths.
  Export contract: connectors use supported triangle markers; emphasis arrows are closed paths.
  -->
  <defs>
    <marker id="branchHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <text x="70" y="76" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="700" fill="#0F172A">Branching Direction Map</text>
  <text x="70" y="108" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#64748B">Use when one capability, policy, or data source fans out into multiple workstreams.</text>

  <g id="branch-map" font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="80" y="285" width="245" height="120" rx="16" fill="url(#sourceGrad)" stroke="#93C5FD" stroke-width="2"/>
    <text x="202" y="335" text-anchor="middle" font-size="22" font-weight="800" fill="#1E3A8A">统一源头</text>
    <text x="202" y="365" text-anchor="middle" font-size="14" fill="#475569">policy / data / capability</text>

    <path d="M325,345 C455,345 470,205 590,205" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#branchHead)"/>
    <path d="M325,345 C455,345 470,345 590,345" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#branchHead)"/>
    <path d="M325,345 C455,345 470,485 590,485" fill="none" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#branchHead)"/>

    <rect x="600" y="155" width="270" height="96" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="735" y="196" text-anchor="middle" font-size="20" font-weight="800" fill="#1E3A8A">路径一</text>
    <text x="735" y="223" text-anchor="middle" font-size="14" fill="#64748B">标准化与规则沉淀</text>

    <rect x="600" y="297" width="270" height="96" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="735" y="338" text-anchor="middle" font-size="20" font-weight="800" fill="#1E3A8A">路径二</text>
    <text x="735" y="365" text-anchor="middle" font-size="14" fill="#64748B">平台建设与工具支撑</text>

    <rect x="600" y="439" width="270" height="96" rx="14" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="735" y="480" text-anchor="middle" font-size="20" font-weight="800" fill="#1E3A8A">路径三</text>
    <text x="735" y="507" text-anchor="middle" font-size="14" fill="#64748B">场景推广与闭环优化</text>

    <path d="M900,203 H1025 V171 L1160,250 L1025,329 V297 H900 Z" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
    <path d="M900,345 H1025 V313 L1160,392 L1025,471 V439 H900 Z" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>
    <text x="1040" y="258" text-anchor="middle" font-size="17" font-weight="800" fill="#1E3A8A">成果 A</text>
    <text x="1040" y="400" text-anchor="middle" font-size="17" font-weight="800" fill="#1E3A8A">成果 B</text>
  </g>
</svg>

