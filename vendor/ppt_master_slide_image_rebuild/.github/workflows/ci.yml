name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (cairo + CJK fonts for render fixtures)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libcairo2-dev fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Byte-compile all scripts (catches syntax errors)
        run: |
          python -m compileall -q scripts

      - name: Run fixture test suite
        run: |
          python -m pytest tests/ -v
